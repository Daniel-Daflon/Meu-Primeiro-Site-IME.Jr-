<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - DAFLON_SCANS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-centralizada">
    <main class="conteiner-cadastro">
        <div class="logo-cadastro">DAFLON<span class="destaque">_SCANS</span></div>
        <h1 class="titulo-conta">CRIAR CONTA</h1>
        <form action="#" method="post" class="formulario-cadastro">
            <div class="colunas">

            <div class="informacoes-basicas">
                <div class="campo">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Insira seu nome" required>
                </div>
                <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Insira seu gmail" required>
                </div>
                <div class="campo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
                </div>
                </div>
            <div class="preferencias">
                <div class="campo-selecao">
                    <label>Gêneros de interesse:</label>
                    <div class="opcoes-grupo">
                        <label class="opcao-item">
                            <input type="checkbox" name="interesses" value="Ação"> Ação
                        </label>
                        <label class="opcao-item">
                            <input type="checkbox" name="interesses" value="Romances"> Romances
                        </label>
                        </div>
                    </div>

            <div class="campo-selecao">
                <label>Tipo de conta:</label>
                <div class="opcoes-grupo">
                    <label class="opcao-item">
                        <input type="radio" name="plano" value="gratuito" required> AMADOR(GRATIS)
                    </label>
                    <label class="opcao-item">
                        <input type="radio" name="plano" value="premium" required> GOAT(PREMIUM)
                    </label>
                </div>
            </div>
            </div>
        </div>

            <button type="submit" class="BOTAODELEITURA">FINALIZAR CADASTRO</button>
            <p class="link-login">Já tem uma conta? <a href="index.html">Faça login</a></p>

        </form>
        

</html>
